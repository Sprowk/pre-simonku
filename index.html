                    <ellipse cx="12" cy="82" rx="7" ry="4" fill="#9b59b6"><animate attributeName="cx" values="12;28;12" dur="0.4s" repeatCount="indefinite"/></ellipse>
                    <ellipse cx="48" cy="82" rx="7" ry="4" fill="#9b59b6"><animate attributeName="cx" values="48;32;48" dur="0.4s" repeatCount="indefinite"/></ellipse>
                </svg>
                <div class="heart-trail">❤️</div>
                <div class="heart-trail h2">💕</div>
            </div>

            <!-- Day markers — positioned by JS using SVG coordinates -->
            <div class="day-marker locked" data-day="1" id="marker-1" data-svg-x="107" data-svg-y="640">
                <div class="marker-circle">1</div>
                <span class="marker-label">Pondelok</span>
            </div>
            <div class="day-marker locked" data-day="2" id="marker-2" data-svg-x="305" data-svg-y="628">
                <div class="marker-circle">2</div>
                <span class="marker-label">Utorok</span>
            </div>
            <div class="day-marker locked" data-day="3" id="marker-3" data-svg-x="506" data-svg-y="610">
                <div class="marker-circle">3</div>
                <span class="marker-label">Streda</span>
            </div>
            <div class="day-marker locked" data-day="4" id="marker-4" data-svg-x="686" data-svg-y="630">
                <div class="marker-circle">4</div>
                <span class="marker-label">Štvrtok</span>
            </div>
            <div class="day-marker locked" data-day="5" id="marker-5" data-svg-x="867" data-svg-y="625">
                <div class="marker-circle">5</div>
                <span class="marker-label">Piatok</span>
            </div>
            <div class="day-marker locked" data-day="6" id="marker-6" data-svg-x="1052" data-svg-y="600">
                <div class="marker-circle">6</div>
                <span class="marker-label">Sobota</span>
            </div>
            <div class="day-marker locked" data-day="0" id="marker-0" data-svg-x="1245" data-svg-y="630">
                <div class="marker-circle">7</div>
                <span class="marker-label">Nedeľa</span>
            </div>
        </div>

        <!-- Zoom controls — outside canvas so they don't transform -->
        <div class="zoom-controls" id="zoom-controls">
            <button class="zoom-btn" id="zoom-in" aria-label="Priblížiť">+</button>
            <button class="zoom-btn" id="zoom-out" aria-label="Oddialiť">−</button>
            <button class="zoom-btn zoom-btn-home" id="zoom-home" aria-label="Reset">⌂</button>
        </div>

        <!-- Slide hint arrows for mobile -->
        <div class="slide-hint slide-hint-left" id="hint-left">‹</div>
        <div class="slide-hint slide-hint-right" id="hint-right">›</div>
    </div>

    <footer>
        <p>S láskou, Alexander ❤️</p>
    </footer>

    <!-- Modal -->
    <div id="surprise-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="close-btn" aria-label="Zavrieť">&times;</button>
            <div id="scene-container"></div>
            <div class="poem-container">
                <h2 id="surprise-title"></h2>
                <div class="poem-divider"><span>♥</span></div>
                <p id="surprise-poem"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
